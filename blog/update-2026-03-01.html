    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; }

        nav a:hover { color: var(--accent); }
        .container { max-width: 800px; margin: 0 auto; padding: 3rem 2rem; }
        h1 { font-size: 2.25rem; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 0.5rem; }
        .date { color: #999; margin-bottom: 2rem; font-size: 0.9rem; }
        p { margin-bottom: 1.25rem; color: var(--text-secondary); }
        h2 { font-size: 1.5rem; font-weight: 600; margin: 2.5rem 0 1rem; }
        ul { margin: 1rem 0; padding-left: 1.5rem; color: var(--text-secondary); }
        li { margin-bottom: 0.5rem; }
        code { background: var(--code-bg); padding: 0.2rem 0.4rem; border-radius: 4px; font-size: 0.9em; }
        footer { background: var(--surface); border-top: 1px solid var(--border); padding: 2rem; text-align: center; color: var(--text-secondary); font-size: 0.9rem; }
    </style>
</head>
